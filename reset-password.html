<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrasilDubai — Redefinir Senha</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">

  <button class="lang-toggle" onclick="toggleLang()">🇺🇸 EN</button>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-text">🇧🇷 BrasilDubai</div>
      <div class="logo-sub">Portal do Cliente</div>
    </div>

    <h1 class="auth-title" data-i18n="reset_password_title">Redefinir senha</h1>
    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>

    <form id="resetForm" onsubmit="handlePasswordUpdate(event)">
      <div class="form-group">
        <label data-i18n="new_password">Nova senha</label>
        <input type="password" id="newPassword" required minlength="6" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label data-i18n="confirm_password">Confirmar nova senha</label>
        <input type="password" id="confirmPassword" required minlength="6" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">
        <span data-i18n="save">Salvar</span>
      </button>
    </form>

    <div class="auth-footer">
      <a href="index.html" data-i18n="login_link">Fazer login</a>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/deploy-config.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (async () => {
      applyTranslations();
      const hash = window.location.hash || '';
      if (!hash.includes('type=recovery') || !hash.includes('access_token=')) {
        const errEl = document.getElementById('errorMsg');
        errEl.textContent = currentLang === 'pt'
          ? 'Link inválido ou expirado. Solicite um novo link.'
          : 'Invalid or expired link. Request a new one.';
        errEl.classList.add('show');
      }
    })();

    async function handlePasswordUpdate(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errEl = document.getElementById('errorMsg');
      const succEl = document.getElementById('successMsg');
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      errEl.classList.remove('show');
      succEl.classList.remove('show');

      if (newPassword.length < 6) {
        errEl.textContent = currentLang === 'pt'
          ? 'A nova senha deve ter pelo menos 6 caracteres.'
          : 'New password must be at least 6 characters.';
        errEl.classList.add('show');
        return;
      }

      if (newPassword !== confirmPassword) {
        errEl.textContent = currentLang === 'pt'
          ? 'As senhas não coincidem.'
          : 'Passwords do not match.';
        errEl.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = `<span>${t('saving') || 'Salvando...'}</span>`;

      const { error } = await supabase.auth.updateUser({ password: newPassword });
      if (error) {
        errEl.textContent = error.message;
        errEl.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = `<span data-i18n="save">${t('save')}</span>`;
        return;
      }

      succEl.textContent = currentLang === 'pt'
        ? 'Senha redefinida com sucesso! Redirecionando para login...'
        : 'Password updated successfully! Redirecting to login...';
      succEl.classList.add('show');
      setTimeout(() => { window.location.href = 'index.html'; }, 1800);
    }
  </script>
</body>
</html>
