<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrasilDubai — Painel do Funcionário</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    .emp-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      align-items: start;
    }
    .client-panel { position: sticky; top: 84px; }
    @media(max-width:768px) {
      .emp-layout { grid-template-columns: 1fr; }
      .client-panel { position: static; }
    }
  </style>
</head>
<body class="app-layout">

  <header class="app-header">
    <span class="header-logo">🇧🇷 BrasilDubai</span>
    <div class="header-actions">
      <span class="header-user" id="headerUser">…</span>
      <span class="header-role-badge" id="headerRole"></span>
      <button class="lang-btn-header" onclick="toggleLang()">🇺🇸 EN</button>
      <button class="btn-logout" onclick="logout()" data-i18n="logout">Sair</button>
    </div>
  </header>

  <main class="app-content" style="max-width:1200px">
    <div class="page-header">
      <h1 class="page-title" data-i18n="clients">Clientes</h1>
      <p class="page-subtitle" id="clientCount"></p>
    </div>

    <div class="emp-layout">
      <!-- Left: client list -->
      <div class="client-panel">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" class="form-group"
                 data-i18n-ph="search_client" placeholder="Buscar cliente..."
                 oninput="filterClients(this.value)"
                 style="width:100%;padding:10px 12px 10px 38px;border:2px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:14px">
        </div>
        <div id="clientList">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Right: checklist -->
      <div id="checklistPanel">
        <div class="card">
          <div class="empty-state">
            <div class="empty-icon">👈</div>
            <p class="empty-text" data-i18n="select_client">Selecione um cliente para ver o checklist</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Upload doc modal -->
  <div id="uploadModal" class="modal-overlay">
    <div class="modal">
      <h2 class="modal-title">📎 Enviar Documento</h2>
      <div class="form-group">
        <label>Selecionar arquivo</label>
        <input type="file" id="modalFileInput" style="padding:8px">
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeUploadModal()" data-i18n="cancel">Cancelar</button>
        <button class="btn btn-primary" style="width:auto" onclick="confirmUpload()" data-i18n="upload_doc">Enviar</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    let empProfile = null;
    let allClients = [];
    let selectedClientId = null;

    (async () => {
      empProfile = await initPage(['employee', 'admin']);
      if (!empProfile) return;
      await loadAllClients();
    })();

    // ---- Load clients ----
    async function loadAllClients() {
      const { data, error } = await supabase
        .from('profiles')
        .select('id, full_name, whatsapp, service_id, services(slug, name_pt, name_en)')
        .eq('role', 'client')
        .order('full_name');

      if (error) { showToast(t('error_occurred'), 'error'); return; }

      allClients = data || [];
      document.getElementById('clientCount').textContent =
        `${allClients.length} ${currentLang === 'pt' ? 'clientes ativos' : 'active clients'}`;

      renderClientList(allClients);
    }

    function renderClientList(clients) {
      const container = document.getElementById('clientList');
      if (!clients.length) {
        container.innerHTML = `<div class="empty-state"><p class="empty-text" data-i18n="no_clients">${t('no_clients')}</p></div>`;
        return;
      }

      container.innerHTML = clients.map(c => {
        const svcName = c.services
          ? (currentLang === 'pt' ? c.services.name_pt : c.services.name_en)
          : '—';
        const isSelected = c.id === selectedClientId;
        return `
          <div class="client-row ${isSelected ? 'selected' : ''}" onclick="selectClient('${c.id}')">
            <div>
              <div class="client-name">${c.full_name}</div>
              <div class="client-service-badge">${svcName}</div>
            </div>
            <span style="color:var(--text-muted);font-size:18px">›</span>
          </div>`;
      }).join('');
    }

    function filterClients(query) {
      const q = query.toLowerCase();
      renderClientList(allClients.filter(c =>
        c.full_name.toLowerCase().includes(q)
      ));
    }

    // ---- Select client ----
    async function selectClient(clientId) {
      selectedClientId = clientId;
      renderClientList(allClients.filter(c => {
        const q = document.getElementById('searchInput').value.toLowerCase();
        return c.full_name.toLowerCase().includes(q);
      }));
      await loadClientChecklist(clientId);
    }

    async function loadClientChecklist(clientId) {
      const panel = document.getElementById('checklistPanel');
      panel.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;

      const client = allClients.find(c => c.id === clientId);
      const svcName = client?.services
        ? (currentLang === 'pt' ? client.services.name_pt : client.services.name_en)
        : '';

      const { data: steps, error } = await supabase
        .from('client_checklist')
        .select('*, checklist_templates(step_order, title_pt, title_en, percentage)')
        .eq('client_id', clientId)
        .order('checklist_templates(step_order)');

      if (error) { showToast(t('error_occurred'), 'error'); return; }

      const pct = calcProgress(steps || []);

      const { data: docs } = await supabase
        .from('documents').select('*').eq('client_id', clientId)
        .order('uploaded_at', { ascending: false });

      panel.innerHTML = `
        <div class="card">
          <div class="flex items-center justify-between" style="margin-bottom:6px">
            <h2 class="card-title-lg">${client?.full_name || ''}</h2>
            <span class="client-service-badge">${svcName}</span>
          </div>
          <div style="margin-bottom:16px">
            <div style="font-size:13px;font-weight:700;color:var(--primary);margin-bottom:6px">${pct}%</div>
            <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
          </div>

          <div class="card-title" data-i18n="checklist">Checklist</div>
          <div class="checklist" id="empChecklist">
            ${!steps || steps.length === 0
              ? `<div class="empty-state"><p class="empty-text">${currentLang === 'pt' ? 'Nenhuma etapa.' : 'No steps.'}</p></div>`
              : steps.map(s => renderStepRow(s, clientId)).join('')
            }
          </div>
        </div>

        <!-- Documents for this client -->
        <div class="card" style="margin-top:20px">
          <div class="flex items-center justify-between" style="margin-bottom:16px">
            <div class="card-title" style="margin:0" data-i18n="documents">Documentos</div>
            <button class="btn btn-outline btn-sm" onclick="openUploadModal('${clientId}')">
              📎 <span data-i18n="upload_doc">Enviar Documento</span>
            </button>
          </div>
          <div id="empDocs">
            ${!docs || docs.length === 0
              ? `<p style="color:var(--text-muted);font-size:14px">${t('no_documents')}</p>`
              : docs.map(d => `
                <div class="doc-item">
                  <div>
                    <div class="doc-name">📄 ${d.filename}</div>
                    <div class="doc-date">${formatDateTime(d.uploaded_at)}</div>
                  </div>
                  <button class="btn btn-outline btn-sm"
                    onclick="downloadDoc('${d.storage_path}','${d.filename}')">
                    ⬇️ <span data-i18n="download">Baixar</span>
                  </button>
                </div>`).join('')
            }
          </div>
        </div>`;

      applyTranslations();
    }

    function renderStepRow(s, clientId) {
      const tpl = s.checklist_templates;
      const title = currentLang === 'pt' ? tpl.title_pt : tpl.title_en;
      const pctText = tpl.percentage != null ? ` (${tpl.percentage}%)` : '';
      return `
        <div class="checklist-item ${s.status}" id="step-${s.id}">
          <div class="step-bubble">${tpl.step_order}</div>
          <div class="step-info">
            <div class="step-title">${title}${pctText}</div>
          </div>
          <select class="status-select" onchange="updateStepStatus('${s.id}', this.value, '${clientId}')">
            <option value="pending"     ${s.status === 'pending'     ? 'selected' : ''}>${t('status_pending')}</option>
            <option value="in_progress" ${s.status === 'in_progress' ? 'selected' : ''}>${t('status_in_progress')}</option>
            <option value="done"        ${s.status === 'done'        ? 'selected' : ''}>${t('status_done')}</option>
          </select>
        </div>`;
    }

    // ---- Update step status ----
    async function updateStepStatus(stepId, newStatus, clientId) {
      const { error } = await supabase
        .from('client_checklist')
        .update({ status: newStatus, updated_at: new Date().toISOString(), updated_by: empProfile.id })
        .eq('id', stepId);

      if (error) { showToast(t('error_occurred'), 'error'); return; }

      // Update DOM
      const row = document.getElementById('step-' + stepId);
      if (row) {
        row.className = `checklist-item ${newStatus}`;
      }

      showToast(t('status_updated'), 'success');

      // Refresh progress
      const { data: steps } = await supabase
        .from('client_checklist')
        .select('status')
        .eq('client_id', clientId);
      const pct = calcProgress(steps || []);
      const fillEl = document.querySelector(`#checklistPanel .progress-fill`);
      const pctEl  = document.querySelector(`#checklistPanel .progress-fill`);
      if (fillEl) fillEl.style.width = pct + '%';
      document.querySelector('#checklistPanel [style*="font-weight:700;color:var(--primary)"]').textContent = pct + '%';
    }

    // ---- Document upload ----
    let uploadTargetClientId = null;

    function openUploadModal(clientId) {
      uploadTargetClientId = clientId;
      document.getElementById('uploadModal').classList.add('show');
    }
    function closeUploadModal() {
      document.getElementById('uploadModal').classList.remove('show');
      document.getElementById('modalFileInput').value = '';
    }

    async function confirmUpload() {
      const fileInput = document.getElementById('modalFileInput');
      const file = fileInput.files[0];
      if (!file || !uploadTargetClientId) return;

      const path = `${uploadTargetClientId}/${Date.now()}_${file.name}`;
      const { error: upErr } = await supabase.storage.from('documents').upload(path, file);
      if (upErr) { showToast(t('error_occurred'), 'error'); return; }

      await supabase.from('documents').insert({
        client_id: uploadTargetClientId,
        filename: file.name,
        storage_path: path,
        uploaded_by: empProfile.id
      });

      showToast(t('file_uploaded'), 'success');
      closeUploadModal();
      loadClientChecklist(uploadTargetClientId);
    }

    async function downloadDoc(storagePath, filename) {
      const { data } = await supabase.storage.from('documents').createSignedUrl(storagePath, 60);
      if (!data) { showToast(t('error_occurred'), 'error'); return; }
      const a = document.createElement('a');
      a.href = data.signedUrl; a.download = filename; a.target = '_blank'; a.click();
    }

    // Lang toggle
    const _origToggle = toggleLang;
    window.toggleLang = function() {
      _origToggle();
      renderClientList(allClients);
      if (selectedClientId) loadClientChecklist(selectedClientId);
    };
  </script>
</body>
</html>
