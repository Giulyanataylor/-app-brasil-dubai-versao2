<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrasilDubai — Recuperar Senha</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">

  <button class="lang-toggle" onclick="toggleLang()">🇺🇸 EN</button>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-text">🇧🇷 BrasilDubai</div>
      <div class="logo-sub">Portal do Cliente</div>
    </div>

    <h1 class="auth-title" data-i18n="forgot_password">Esqueci minha senha</h1>
    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>

    <form onsubmit="sendRecovery(event)">
      <div class="form-group">
        <label data-i18n="email">Email</label>
        <input type="email" id="email" required placeholder="seu@email.com" autocomplete="email">
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">
        <span data-i18n="reset_password_title">Redefinir senha</span>
      </button>
    </form>

    <div class="auth-footer">
      <a href="index.html" data-i18n="login_link">Fazer login</a>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/deploy-config.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    applyTranslations();

    async function sendRecovery(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errEl = document.getElementById('errorMsg');
      const succEl = document.getElementById('successMsg');
      const email = document.getElementById('email').value.trim();

      errEl.classList.remove('show');
      succEl.classList.remove('show');
      btn.disabled = true;
      btn.innerHTML = `<span>${currentLang === 'pt' ? 'Enviando...' : 'Sending...'}</span>`;

      const redirectTo = `${window.location.origin}/reset-password.html`;
      const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo });

      if (error) {
        errEl.textContent = error.message;
        errEl.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = `<span data-i18n="reset_password_title">${t('reset_password_title')}</span>`;
        return;
      }

      succEl.textContent = currentLang === 'pt'
        ? 'Link de redefinição enviado! Verifique seu e-mail.'
        : 'Reset link sent! Check your email.';
      succEl.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = `<span data-i18n="reset_password_title">${t('reset_password_title')}</span>`;
    }
  </script>
</body>
</html>
