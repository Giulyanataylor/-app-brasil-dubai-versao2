<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrasilDubai — Portal do Cliente</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">

  <button class="lang-toggle" onclick="toggleLang()">🇺🇸 EN</button>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-text">🇧🇷 BrasilDubai</div>
      <div class="logo-sub" id="portalLabel">Portal do Cliente</div>
    </div>

    <h1 class="auth-title" data-i18n="login_title">Bem-vindo de volta</h1>

    <div id="errorMsg" class="error-msg"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label data-i18n="email">Email</label>
        <input type="email" id="email" required
               placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label data-i18n="password">Senha</label>
        <input type="password" id="password" required
               placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">
        <span data-i18n="enter">Entrar</span>
      </button>
      <div style="margin-top:10px;text-align:right">
        <a href="#" onclick="sendPasswordReset(event)" data-i18n="forgot_password">Esqueci minha senha</a>
      </div>
    </form>

    <div class="auth-footer">
      <span data-i18n="no_account">Não tem conta?</span>
      <a href="register.html" data-i18n="register_link">Criar conta</a>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/deploy-config.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Check if already authenticated
    (async () => {
      applyTranslations();
      const user = await getCurrentUser();
      if (user) {
        const profile = await getCurrentProfile();
        if (profile) redirectToDashboard(profile.role);
      }
    })();

    async function handleLogin(e) {
      e.preventDefault();
      const btn      = document.getElementById('submitBtn');
      const errEl    = document.getElementById('errorMsg');
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      errEl.classList.remove('show');
      btn.disabled = true;
      btn.innerHTML = `<span>${t('logging_in')}</span>`;

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        errEl.textContent = currentLang === 'pt'
          ? 'Email ou senha incorretos. Verifique e tente novamente.'
          : 'Invalid email or password. Please try again.';
        errEl.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = `<span data-i18n="enter">${t('enter')}</span>`;
        return;
      }

      const profile = await getCurrentProfile();
      redirectToDashboard(profile?.role || 'client');
    }

    async function sendPasswordReset(e) {
      e.preventDefault();
      const errEl = document.getElementById('errorMsg');
      const email = document.getElementById('email').value.trim();

      errEl.classList.remove('show');
      if (!email) {
        errEl.textContent = currentLang === 'pt'
          ? 'Digite seu email para receber o link de redefinição.'
          : 'Enter your email to receive the reset link.';
        errEl.classList.add('show');
        return;
      }

      const redirectTo = `${window.location.origin}/reset-password.html`;
      const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo });
      if (error) {
        errEl.textContent = error.message;
        errEl.classList.add('show');
        return;
      }

      showToast(currentLang === 'pt'
        ? 'Link de redefinição enviado para seu email.'
        : 'Password reset link sent to your email.', 'success');
    }
  </script>
</body>
</html>
